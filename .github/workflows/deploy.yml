# Test
name: Deploy MTIC Value Chains App

# Every push to any branch:
#   0. Doc Guardian (parallel, non-blocking)
#   A. Ingestion Agent — runs ONLY when data/uploads/ changes; mines docs + seeds PocketBase
#   B. Synthesis Agent — runs after ingest; reads PocketBase → writes chapters
#   C. Review Agent    — runs after synthesis; validates chapters via quality_gate.json
#                        PUBLISH → opens chapter PR   |   FAIL → writes revision notice
#   D. Gap-fill seeder — runs ONLY on main when data/proposed/ changes (gap-fill PR merged)
#                        re-seeds approved proposals to PocketBase and re-triggers synthesis
#   1. Build the React frontend (app/frontend → dist/)
#   2. Deploy dist/ to staging + health check (self-heal retry up to MAX_HEAL_ATTEMPTS)
#   3. Staging passes → promote to prod + auto-merge branch to main

on:
  push:
    branches: ["**"]
  # Self-dispatched by the "Trigger PocketBase reseed on main" and "Trigger
  # one rebuild..." steps below. A plain `git push` to main using the bot's
  # GITHUB_TOKEN does NOT trigger a new on:push run (GitHub's anti-recursion
  # rule for GITHUB_TOKEN-authored pushes), so auto-merge alone never reaches
  # the seed-pocketbase job below (it's gated to github.ref ==
  # refs/heads/main). Dispatching this event explicitly via `gh workflow run`
  # is the documented way around that rule.
  workflow_dispatch:
    inputs:
      reseed_followup:
        description: "Internal — set by CI when this run exists only to pick up freshly-seeded PocketBase data. Bounds the auto-chain to exactly one follow-up run; do not set manually more than once in a row."
        type: boolean
        default: false
  # Drift Check (see the drift-check job below): per ADR-011 all PocketBase
  # writes are supposed to go through the CSV -> db/pb_setup.py pipeline,
  # never a direct admin-UI edit. Nothing technically stops that, so this
  # checks on a timer rather than waiting for a push to notice.
  schedule:
    - cron: "0 */6 * * *"

env:
  HETZNER_HOST:       89.167.121.193
  HETZNER_USER:       root
  STAGING_DIR:        /var/www/mtic-staging
  PROD_DIR:           /var/www/mtic-prod
  STAGING_URL:        http://89.167.121.193:8200
  PROD_URL:           http://89.167.121.193:8201
  PROD_SHORT_URL:     https://tinyurl.com/28lxntmc
  MAX_HEAL_ATTEMPTS:  3

permissions:
  contents:      write
  actions:       write
  pull-requests: write   # needed by the drift-check job to open review PRs

jobs:
  # ── A. Ingestion Agent (only when uploads change) ─────────────────────────
  ingest:
    name: Ingestion Agent
    runs-on: ubuntu-latest
    if: |
      contains(toJson(github.event.commits.*.modified), 'data/uploads/') ||
      contains(toJson(github.event.commits.*.added), 'data/uploads/')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ingestion agent
        env:
          PB_URL:              ${{ secrets.PB_URL }}
          PB_ADMIN_EMAIL:      ${{ secrets.PB_ADMIN_EMAIL }}
          PB_ADMIN_PASSWORD:   ${{ secrets.PB_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/ingestion_agent.py

      - name: Commit ingested datapoints
        run: |
          git config user.name  "MTIC CI Bot"
          git config user.email "ci-bot@mtic-pipeline"
          git add data/ingested/ data/proposed/
          if git diff --cached --quiet; then
            echo "No new datapoints to commit."
          else
            git commit -m "ingest: agent run ${{ github.sha }} — new datapoints"
            git push origin ${{ github.ref_name }}
          fi

      - name: Open gap-fill PR if proposals exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROP=$(ls data/proposed/web_gap_fill_*.json 2>/dev/null | tail -1)
          if [ -z "$PROP" ]; then exit 0; fi
          BRANCH="propose/web-gap-fill-$(date +%Y%m%d)"
          git checkout -b $BRANCH
          git add data/proposed/
          git commit -m "propose: web gap-fill candidates - review and merge to approve"
          git push origin $BRANCH
          gh pr create --title "Gap-fill proposals for review" --body "Ingestion agent found gaps and proposed values. See data/proposed/ and review before merging." --base main --head $BRANCH
      - name: Run synthesis agent
        env:
          PB_URL:            ${{ secrets.PB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/synthesis_agent.py

      - name: Commit synthesised chapters + pipeline status
        run: |
          git config user.name  "MTIC CI Bot"
          git config user.email "ci-bot@mtic-pipeline"
          git add report/chapters/ data/pipeline_status.json
          if git diff --cached --quiet; then
            echo "No new chapters to commit."
          else
            git commit -m "synthesise: agent run ${{ github.sha }} — new chapters"
            git push origin ${{ github.ref_name }}
          fi

  # ── C. Review Agent (after synthesis) ────────────────────────────────────
  review:
    name: Review Agent
    runs-on: ubuntu-latest
    needs: ingest
    if: needs.ingest.result == 'success'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run review agent
        env:
          PB_URL:            ${{ secrets.PB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
        run: python agents/review_agent.py

      - name: Commit revision notices + pipeline status
        run: |
          git config user.name  "MTIC CI Bot"
          git config user.email "ci-bot@mtic-pipeline"
          git add data/revision/ data/pipeline_status.json
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
          else
            git commit -m "review: notices + status from run ${{ github.sha }}"
            git push origin ${{ github.ref_name }}
          fi

      - name: WhatsApp notify on revision
        env:
          WA_RECIPIENT: ${{ secrets.WA_RECIPIENT }}
          WA_TOKEN:     ${{ secrets.WA_TOKEN }}
          WA_PROVIDER:  ${{ secrets.WA_PROVIDER }}
        run: |
          if ls data/revision/*.md 2>/dev/null | head -1 | grep -q .; then
            python agents/whatsapp_notify.py
          else
            echo "No revision notices — WhatsApp notification skipped."
          fi

  # ── D. Gap-fill seeder (main only, when data/proposed/ changes) ─────────
  # Triggered when Jerome merges a gap-fill PR — re-seeds approved proposals
  # to PocketBase then kicks off synthesis + review automatically.
  gapfill-seed:
    name: Gap-fill Seeder
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' && (
        contains(toJson(github.event.commits.*.modified), 'data/proposed/') ||
        contains(toJson(github.event.commits.*.added), 'data/proposed/')
      )
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Seed approved gap-fill proposals to PocketBase
        env:
          PB_URL:            ${{ secrets.PB_URL }}
          PB_ADMIN_EMAIL:    ${{ secrets.PB_ADMIN_EMAIL }}
          PB_ADMIN_PASSWORD: ${{ secrets.PB_ADMIN_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/gapfill_seeder.py

      - name: Run synthesis on updated chains
        env:
          PB_URL:            ${{ secrets.PB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agents/synthesis_agent.py

      - name: Run review on updated chains
        env:
          PB_URL:            ${{ secrets.PB_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
        run: python agents/review_agent.py

      - name: Commit all outputs
        run: |
          git config user.name  "MTIC CI Bot"
          git config user.email "ci-bot@mtic-pipeline"
          git add report/chapters/ data/revision/ data/pipeline_status.json
          if git diff --cached --quiet; then
            echo "No new outputs to commit."
          else
            git commit -m "gapfill: re-synthesise + review after approved proposals"
            git push origin main
          fi

      - name: WhatsApp notify on revision
        env:
          WA_RECIPIENT: ${{ secrets.WA_RECIPIENT }}
          WA_TOKEN:     ${{ secrets.WA_TOKEN }}
          WA_PROVIDER:  ${{ secrets.WA_PROVIDER }}
        run: |
          if ls data/revision/*.md 2>/dev/null | head -1 | grep -q .; then
            python agents/whatsapp_notify.py
          else
            echo "All chains passed review."
          fi

  # ── 0. Doc Guardian (parallel, never blocks deploy) ───────────────────────
  doc-check:
    name: Doc Guardian
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Enforce ADR<->DSL coupling; warn on architecture drift
        run: |
          DSL="docs/architecture.dsl"
          ADR_CHANGED=$(git diff --name-only HEAD~1 HEAD -- docs/adr/ 2>/dev/null | grep -c . || true)
          DSL_CHANGED=$(git diff --name-only HEAD~1 HEAD -- "$DSL" 2>/dev/null | grep -c . || true)

          # HARD GATE (fails the run): an ADR is an architecture decision, so the
          # C4 model must move with it. This is the repo-level, ships-with-the-code
          # equivalent of Hillary's local doc-guardian hook — it runs for every
          # contributor and survives a move to another server/host.
          if [ "$ADR_CHANGED" -gt 0 ] && [ "$DSL_CHANGED" -eq 0 ]; then
            echo "::error::An ADR changed but docs/architecture.dsl did not. Update the C4 model to reflect the decision."
            exit 1
          fi

          # SOFT WARNING: other architecture code changed without a DSL update.
          ARCH_PATTERNS=".github/workflows app/backend app/frontend/src app/explorer/src scripts agents uploader midd-brain db"
          ARCH_CHANGED=false
          for pattern in $ARCH_PATTERNS; do
            if git diff --name-only HEAD~1 HEAD -- "$pattern" 2>/dev/null | grep -q .; then
              ARCH_CHANGED=true; echo "Architecture-relevant change in: $pattern"
            fi
          done
          if $ARCH_CHANGED && [ "$DSL_CHANGED" -eq 0 ]; then
            echo "::warning::Architecture code changed but docs/architecture.dsl was NOT updated — confirm the C4 model doesn't need it."
          fi
          echo "doc-check passed"

  # ── 1. Build React frontend ───────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50   # generate_dashboard.py reads git log for the Recently Updated panel

      # SINGLE SOURCE guard (ADR-017): fails the build (and thus deploy + auto-merge)
      # if a file-based data source or fallback is reintroduced. Server-side, on every
      # push — the enforcement no agent (Solomon's or Hillary's) can bypass.
      - name: Single-source guard (ADR-017)
        run: bash scripts/check_single_source.sh

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            app/frontend/package-lock.json
            app/explorer/package-lock.json

      - name: Install dependencies
        run: |
          cd app/frontend && npm ci && cd "$GITHUB_WORKSPACE"
          cd app/explorer && npm ci && cd "$GITHUB_WORKSPACE"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Tests gate the build (ADR-018): tests must pass, AND changed code must be
      # >90% covered (diff-cover vs origin/main) before anything deploys. This is the
      # enforcement — new/changed pipeline code without tests fails the build.
      - name: Run tests + coverage gate on changed code (ADR-018)
        run: |
          pip install -r requirements-dev.txt
          python -m pytest -q --cov=scripts --cov=db --cov=agents --cov=uploader --cov=midd-brain --cov-report=xml
          git fetch --no-tags --depth=1 origin main || true
          # Fail if <90% of the lines changed in this push are covered by tests.
          diff-cover coverage.xml --compare-branch=origin/main --fail-under=90

      - name: Generate dashboard from data files
        env:
          PB_URL: ${{ secrets.PB_URL }}
        run: python scripts/generate_dashboard.py

      - name: Generate Value Chain Explorer data from PocketBase
        env:
          PB_URL: ${{ secrets.PB_URL }}
        run: python scripts/generate_explorer_data.py

      - name: Build
        run: |
          REPO="$GITHUB_WORKSPACE"
          cd app/frontend && VITE_BASE=/ npm run build && cd "$REPO"
          cd app/explorer && npm run build && cd "$REPO"
          # Vite outputs to report/sankey-dist/ and copies to report/sankey.html
          # (same single-file pattern for app/explorer -> report/explorer.html).
          # Bundle the files the server needs into site/:
          #   index.html    = the main dashboard (sources-of-truth.html)
          #   sankey.html   = the React Sankey app (self-contained, iframed by index.html)
          #   explorer.html = the React Value Chain Explorer (self-contained, iframed by index.html)
          mkdir -p site
          cp report/sources-of-truth.html site/index.html
          cp report/sankey.html site/sankey.html
          cp report/explorer.html site/explorer.html
          cp report/pb-guide.html site/pb-guide.html
          cp report/upload-guide.html site/upload-guide.html
          cp report/uganda_coat_of_arms.png site/uganda_coat_of_arms.png
          [ -f data/pipeline_status.json ] && cp data/pipeline_status.json site/pipeline_status.json || true
          mkdir -p site/chapters
          ls report/chapters/VC*.md 2>/dev/null && cp report/chapters/VC*.md site/chapters/ || true
          cp report/chapters/report1-*.md site/chapters/ 2>/dev/null || true
          cp report/chapters/report2-*.md site/chapters/ 2>/dev/null || true

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: site/
          retention-days: 1

  # ── 2. Deploy to staging + self-heal ─────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    outputs:
      staged: ${{ steps.heal.outputs.staged }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50   # generate_dashboard reads git log for the Recently Updated panel

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Rebuild dashboard index from STAGING PocketBase
        # The build job renders index.html from PROD PocketBase (secrets.PB_URL). But staging
        # is the DATA workshop: uploads land in staging PB (:8091) and Jerome reviews them there
        # before Apply-to-production. So re-render index.html from STAGING PB here and swap it in,
        # so staging reflects staging data instead of being clobbered with prod data.
        # deploy-prod promotes STAGING_DIR -> PROD_DIR byte-for-byte, so it MUST re-render
        # index.html from PROD PB (:8090) afterwards (it does) — otherwise this staging-PB render
        # leaks unpromoted data onto prod. generate_dashboard.py is stdlib-only.
        run: |
          # HETZNER_HOST is a workflow-level env var (literal IP), NOT a secret.
          export PB_URL="http://$HETZNER_HOST:8091"
          python3 scripts/generate_dashboard.py
          cp report/sources-of-truth.html dist/index.html

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HETZNER_HOST >> ~/.ssh/known_hosts

      - name: Deploy + self-heal retry loop
        id: heal
        run: |
          MAX=${{ env.MAX_HEAL_ATTEMPTS }}
          STAGED=false

          for attempt in $(seq 1 $MAX); do
            echo ""
            echo "=== Heal attempt $attempt/$MAX ==="

            echo "Syncing dist/ to staging..."
            if ! rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
                dist/ $HETZNER_USER@$HETZNER_HOST:$STAGING_DIR/; then
              echo "rsync failed on attempt $attempt"
              [ $attempt -lt $MAX ] && sleep 10 && continue || break
            fi

            echo "Health checking $STAGING_URL ..."
            for i in $(seq 1 10); do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" $STAGING_URL/ || echo "000")
              echo "  Check $i: HTTP $STATUS"
              if [ "$STATUS" = "200" ]; then
                STAGED=true
                break
              fi
              sleep 3
            done

            $STAGED && break
            echo "Health check failed on attempt $attempt"
            [ $attempt -lt $MAX ] && sleep 10
          done

          if $STAGED; then
            echo "staged=true" >> $GITHUB_OUTPUT
            echo "::notice::Staging healthy: $STAGING_URL"
          else
            echo "staged=false" >> $GITHUB_OUTPUT
            echo "::error::Staging FAILED after $MAX heal attempt(s). Prod unchanged."
            exit 1
          fi

  # ── 3. Promote to prod + auto-merge to main ───────────────────────────────
  deploy-prod:
    name: Promote → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    timeout-minutes: 10
    if: needs.deploy-staging.outputs.staged == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HETZNER_HOST >> ~/.ssh/known_hosts

      - name: Promote staging → prod
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            $HETZNER_USER@$HETZNER_HOST \
            "rsync -a --delete $STAGING_DIR/ $PROD_DIR/"
          echo "prod: promoted at $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Re-render prod index from PROD PocketBase
        # The promote above rsyncs STAGING_DIR -> PROD_DIR byte-for-byte, which brings
        # staging's index.html — and that was re-rendered from STAGING PB (the data
        # workshop, :8091) in deploy-staging. Prod must show ONLY promoted data (prod
        # PB :8090, written by Apply-to-Production), so re-render index.html from prod
        # PB here and overwrite the staging copy the promote brought. Without this, the
        # staging-PB render leaks unreviewed data onto the live prod site.
        # generate_dashboard.py is stdlib-only; ubuntu-latest ships python3.
        run: |
          export PB_URL="http://$HETZNER_HOST:8090"
          python3 scripts/generate_dashboard.py
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            report/sources-of-truth.html $HETZNER_USER@$HETZNER_HOST:$PROD_DIR/index.html

      - name: Verify prod
        run: |
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $PROD_URL/ || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
            [ $i -eq 10 ] && { echo "Prod health check failed"; exit 1; }
            sleep 3
          done

      - name: Auto-merge branch to main
        id: automerge
        if: github.ref != 'refs/heads/main'
        continue-on-error: true
        run: |
          BRANCH="${{ github.ref_name }}"
          git config user.name  "MTIC CI Bot"
          git config user.email "ci-bot@mtic-pipeline"
          git fetch origin main
          git checkout main
          if git merge --no-ff origin/$BRANCH -m "ci: auto-merge $BRANCH (staging passed)"; then
            git push origin main
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Auto-merged $BRANCH → main"
          else
            git merge --abort || true
            echo "::warning::Merge conflict: $BRANCH not merged to main. Prod is updated. Resolve manually."
          fi

      # A plain `git push origin main` above (using GITHUB_TOKEN) does not
      # trigger a new on:push run, so seed-pocketbase (gated to
      # refs/heads/main) would otherwise never run after auto-merge. Dispatch
      # a workflow_dispatch run on main explicitly — that's allowed to
      # trigger a fresh run. Re-runs build/deploy/promote too (redundant,
      # same content) but that's the trade for one simple, reliable trigger.
      - name: Trigger PocketBase reseed on main
        if: steps.automerge.outputs.merged == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --ref main
          echo "::notice::Dispatched a run on main to reseed PocketBase"

      - name: Report live URLs
        run: |
          COMMIT="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          echo ""
          echo "============================================"
          echo "  PROD LIVE — MTIC Value Chains App"
          echo "  Full URL:  $PROD_URL"
          echo "  Short URL: $PROD_SHORT_URL"
          echo "  Commit:    ${COMMIT:0:7} from $BRANCH"
          echo "============================================"
          echo "::notice::Prod live: $PROD_SHORT_URL"

  # ── 4. Seed PocketBase (main branch only, after prod succeeds) ─────────────
  seed-pocketbase:
    name: Seed PocketBase
    runs-on: ubuntu-latest
    needs: deploy-prod
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # SCHEMA-ONLY (ADR-017): ensure collections + fields exist, but NEVER re-seed
      # records from committed CSVs — that would overwrite live PocketBase data
      # (incl. Ask MIDD corrections). PocketBase is the source of truth. Bootstrap
      # of an empty PB is a manual run of these scripts WITHOUT PB_SCHEMA_ONLY.
      - name: Ensure PocketBase schema (no data re-seed)
        env:
          PB_URL: ${{ secrets.PB_URL }}
          PB_ADMIN_EMAIL: ${{ secrets.PB_ADMIN_EMAIL }}
          PB_ADMIN_PASSWORD: ${{ secrets.PB_ADMIN_PASSWORD }}
          PB_SCHEMA_ONLY: "1"
        run: python db/pb_setup.py

      - name: Ensure Explorer PocketBase schema (no data re-seed)
        env:
          PB_URL: ${{ secrets.PB_URL }}
          PB_ADMIN_EMAIL: ${{ secrets.PB_ADMIN_EMAIL }}
          PB_ADMIN_PASSWORD: ${{ secrets.PB_ADMIN_PASSWORD }}
          PB_SCHEMA_ONLY: "1"
        run: python db/pb_setup_explorer.py

      - name: Verify seeding
        env:
          PB_URL: ${{ secrets.PB_URL }}
        run: |
          sleep 2
          curl -s ${{ secrets.PB_URL }}/api/health | jq .
          echo "✓ PocketBase seeded and verified"

      # generate_dashboard.py (the build job, earlier in this same run) reads
      # PocketBase BEFORE this seeding step runs, so the content just
      # deployed above can still be one step stale on a run where seeding
      # changed something the build needed. Dispatch one more run, marked
      # reseed_followup so IT skips this step in turn — bounds the chain to
      # exactly one follow-up rebuild, never loops regardless of how this
      # run itself was triggered.
      - name: Trigger one rebuild to pick up freshly-seeded PocketBase data
        if: github.event.inputs.reseed_followup != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run deploy.yml --ref main -f reseed_followup=true
          echo "::notice::Dispatched a rebuild on main to pick up freshly-seeded PocketBase data"

  # ── Deploy the Ask MIDD brain (staging → verify → prod), when its code changes ──
  # Brings the brain into staging-first (ADR-019) instead of a hand-run script. Runs
  # only on main when midd-brain/ changed, after the build+tests pass. The script does
  # the gate: restart staging brain -> verify -> only then restart prod. Staging
  # failure fails this job -> prod untouched -> workflow_run failure pings the group.
  deploy-brain:
    name: Deploy Brain (staging → prod)
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' && (
        contains(toJson(github.event.commits.*.modified), 'midd-brain/') ||
        contains(toJson(github.event.commits.*.added), 'midd-brain/')
      )
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HETZNER_HOST >> ~/.ssh/known_hosts
      - name: Deploy brain staging → verify → prod
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $HETZNER_USER@$HETZNER_HOST \
            'export HOME=/root && cd /opt/midd-brain/repo && git checkout -f main -q && git pull --ff-only -q && bash scripts/deploy_brain.sh'

  # ── Deploy the uploader (staging → verify → prod), when its code changes ────────
  deploy-uploader:
    name: Deploy Uploader (staging → prod)
    runs-on: ubuntu-latest
    needs: build
    if: |
      github.ref == 'refs/heads/main' && (
        contains(toJson(github.event.commits.*.modified), 'uploader/') ||
        contains(toJson(github.event.commits.*.added), 'uploader/')
      )
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HETZNER_HOST >> ~/.ssh/known_hosts
      - name: Deploy uploader staging → verify → prod
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $HETZNER_USER@$HETZNER_HOST \
            'export HOME=/root && cd /opt/mtic-uploader/repo && git checkout -f main -q && git pull --ff-only -q && bash scripts/deploy_uploader.sh'

  # ── 5. Drift Check (scheduled — every 6h) ───────────────────────────────────
  # Per ADR-011, every PocketBase write is supposed to go through
  # data/dashboard/*.csv -> db/pb_setup.py, never a direct PocketBase admin-UI
  # edit. Nothing technically enforces that, so this runs scripts/detect_drift.py
  # on a timer and opens a PR if PocketBase's live data no longer matches
  # what's committed -- the human-readable diff IS the review surface: merge
  # the PR to accept the change (git catches up), or close it and run
  # scripts/restore_from_git.py to reject it (pushes git's values back into
  # PocketBase, deleting any record git doesn't have).
  drift-check:
    name: Drift Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect PocketBase drift
        env:
          PB_URL: ${{ secrets.PB_URL }}
        run: python scripts/detect_drift.py

      - name: Open a PR if drift was found
        id: open-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet data/dashboard/; then
            echo "No drift detected."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name  "MTIC CI Bot"
          git config user.email "ci-bot@mtic-pipeline"
          BRANCH="drift-check-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add data/dashboard/
          git commit -m "drift: PocketBase data differs from committed files"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create --title "PocketBase drift detected — review and merge or close" --base main --head "$BRANCH" --body "PocketBase's live data no longer matches what's committed in \`data/dashboard/\`. This usually means a record was edited directly in the PocketBase admin UI, bypassing the normal CSV -> \`db/pb_setup.py\` -> PocketBase pipeline (ADR-011 says writes shouldn't happen that way, but nothing technically blocks it).

          **Review the diff in this PR carefully**, then:
          - **If the change was intentional** — merge this PR. That brings git in sync with what's now live in PocketBase; no further action needed.
          - **If the change was NOT intentional** — close this PR without merging, then run \`python scripts/restore_from_git.py\` (needs \`PB_ADMIN_EMAIL\`/\`PB_ADMIN_PASSWORD\`) to push git's last-known values back into PocketBase. That also deletes any record PocketBase has that git doesn't — covers someone adding a new row directly, not just editing an existing one.")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "::notice::Opened drift-review PR on $BRANCH"

      - name: Notify team by email and WhatsApp
        if: steps.open-pr.outputs.pr_url != ''
        continue-on-error: true
        env:
          SMTP_USER:    ${{ secrets.SMTP_USER }}
          SMTP_PASS:    ${{ secrets.SMTP_PASS }}
          TWILIO_SID:   ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM:  ${{ secrets.TWILIO_FROM }}
        run: python scripts/notify.py "${{ steps.open-pr.outputs.pr_url }}"
